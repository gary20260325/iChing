<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>旭决天机</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg-primary: #f5f0e8;
  --bg-gradient: radial-gradient(ellipse at 50% 0%, #faf6ef, #f0ebe0 70%);
  --surface: rgba(0,0,0,0.03);
  --surface-border: rgba(180,60,40,0.12);
  --surface-hover: rgba(0,0,0,0.06);
  --text-primary: #2d1f1a;
  --text-secondary: rgba(45,31,26,0.5);
  --text-muted: rgba(45,31,26,0.25);
  --accent: #b43c28;
  --accent-hover: #c94a35;
  --accent-subtle: rgba(180,60,40,0.08);
  --accent-glow: rgba(180,60,40,0.1);
  --btn-bg: linear-gradient(135deg, #b43c28, #8a2a1a);
  --btn-text: #f5f0e8;
  --toast-bg: rgba(180,60,40,0.92);
  --toast-text: #f5f0e8;
  --particle-color: rgba(180,60,40,0.2);
  --divider: rgba(180,60,40,0.1);
  --grain-opacity: 0.03;
  --grain-color: 180,140,100;
}
html.theme-dark {
  --bg-primary: #0a0a0a;
  --bg-gradient: radial-gradient(ellipse at 50% 0%, #151515, #0a0a0a 70%);
  --surface: rgba(255,255,255,0.04);
  --surface-border: rgba(201,169,110,0.15);
  --surface-hover: rgba(255,255,255,0.08);
  --text-primary: #e8e0d0;
  --text-secondary: rgba(232,224,208,0.5);
  --text-muted: rgba(232,224,208,0.25);
  --accent: #c9a96e;
  --accent-hover: #dbb978;
  --accent-subtle: rgba(201,169,110,0.1);
  --accent-glow: rgba(201,169,110,0.15);
  --btn-bg: linear-gradient(135deg, #c9a96e, #a88a4a);
  --btn-text: #0a0a0a;
  --toast-bg: rgba(201,169,110,0.95);
  --toast-text: #0a0a0a;
  --particle-color: rgba(201,169,110,0.4);
  --divider: rgba(201,169,110,0.12);
  --grain-opacity: 0.02;
  --grain-color: 255,255,255;
}
html{-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg-gradient);
  background-color:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  overflow-y:auto;
  touch-action:manipulation;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
  position:relative;
  transition:background 0.4s ease, color 0.4s ease;
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:var(--grain-opacity);
  pointer-events:none;z-index:0;
  transition:opacity 0.4s ease;
}
.font-serif{font-family:"Noto Serif SC",serif}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent-glow);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent-subtle)}

::selection{background:var(--accent-subtle);color:var(--text-primary)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Particles */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;
  width:4px;height:4px;
  background:radial-gradient(circle,var(--particle-color),transparent);
  border-radius:50% 0 50% 50%;
  animation:petalFall linear infinite;
  opacity:0;
  will-change:transform,opacity;
  transition:background 0.4s ease;
}
html.theme-dark .particle{
  width:2px;height:2px;
  border-radius:50%;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:0.8}
  90%{opacity:0.4}
  100%{opacity:0;transform:translateY(-10vh) scale(0.8)}
}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(-10vh) rotate(0deg) translateX(0)}
  10%{opacity:0.6}
  50%{transform:translateY(45vh) rotate(180deg) translateX(30px)}
  90%{opacity:0.3}
  100%{opacity:0;transform:translateY(105vh) rotate(360deg) translateX(-20px)}
}

/* Screens */
.screen{
  display:none;
  flex-direction:column;
  align-items:center;
  min-height:100vh;min-height:100dvh;
  padding:24px 20px env(safe-area-inset-bottom,20px);
  position:relative;
  z-index:1;
}
.screen.active{display:flex;animation:screenIn 0.3s ease}
@keyframes screenIn{from{opacity:0}to{opacity:1}}

/* Theme Toggle */
.theme-toggle{
  position:fixed;
  top:16px;right:16px;
  z-index:100;
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:50px;
  color:var(--text-secondary);
  font-size:0.75rem;
  cursor:pointer;
  touch-action:manipulation;
  transition:all 0.3s ease;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  font-family:inherit;
  letter-spacing:0.05em;
}
.theme-toggle:hover{background:var(--surface-hover);border-color:var(--accent)}
.theme-toggle:active{transform:scale(0.95)}
.theme-toggle .icon{transition:transform 0.4s ease;display:inline-block;font-size:1rem}
.theme-toggle.rotating .icon{transform:rotate(180deg)}
.theme-toggle .label{transition:color 0.4s ease;white-space:nowrap}

/* Language Bar */
.lang-bar{
  position:fixed;
  top:56px;right:16px;
  z-index:100;
  display:flex;align-items:center;gap:0;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:50px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.lang-btn{
  padding:6px 12px;
  background:none;border:none;
  color:var(--text-muted);
  font-size:0.7rem;
  cursor:pointer;
  touch-action:manipulation;
  transition:all 0.3s ease;
  font-family:inherit;
  letter-spacing:0.05em;
  position:relative;
}
.lang-btn:hover{color:var(--text-secondary)}
.lang-btn:active{transform:scale(0.95)}
.lang-btn.active{
  color:var(--accent);
  font-weight:600;
}
.lang-btn.active::after{
  content:'';position:absolute;bottom:2px;left:50%;
  transform:translateX(-50%);
  width:12px;height:2px;
  background:var(--accent);
  border-radius:1px;
}

/* Home Screen */
.home-content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  max-width:400px;
  gap:0;
}

/* Taiji (太极八卦) icon */
.taiji{
  width:80px;height:80px;
  margin-bottom:20px;
  position:relative;
  opacity:0.5;
}
.taiji svg{
  animation:taijiRotate 20s linear infinite;
  filter:drop-shadow(0 0 8px var(--accent-glow));
}
@keyframes taijiRotate{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.main-title{
  font-size:3.5rem;font-weight:300;
  color:var(--accent);
  letter-spacing:0.3em;
  margin-bottom:8px;
  transition:color 0.4s ease;
}
.home-tagline{
  font-size:0.8rem;
  color:var(--text-muted);
  letter-spacing:0.15em;
  margin-bottom:12px;
  transition:color 0.4s ease;
}
.home-divider{
  width:40px;height:1px;
  background:var(--divider);
  margin-bottom:12px;
  transition:background 0.4s ease;
}
.subtitle{
  font-size:0.85rem;
  color:var(--text-secondary);
  letter-spacing:0.1em;
  margin-bottom:40px;
  transition:color 0.4s ease;
}

/* Feature cards - minimal zen style */
.feature-cards{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:0;
}
.feature-card{
  width:100%;
  padding:20px 4px;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--divider);
  color:var(--text-primary);
  font-size:1rem;
  text-align:left;
  cursor:pointer;
  transition:all 0.3s ease;
  touch-action:manipulation;
  display:flex;
  align-items:center;
  gap:16px;
  font-family:inherit;
  opacity:0;
  animation:cardFadeIn 0.3s ease forwards;
  position:relative;
}
.feature-card::before{
  content:'';position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  width:3px;height:0;
  background:var(--accent);
  border-radius:2px;
  transition:height 0.3s ease;
}
.feature-card:active::before{height:24px}
.feature-card:nth-child(1){animation-delay:0.05s}
.feature-card:nth-child(2){animation-delay:0.1s}
.feature-card:nth-child(3){animation-delay:0.15s}
.feature-card:nth-child(4){animation-delay:0.2s}
@keyframes cardFadeIn{from{opacity:0}to{opacity:1}}
.feature-card:last-child{border-bottom:none}
.feature-card:hover{background:var(--surface-hover)}
.feature-card:active{transform:scale(0.98)}
.feature-icon{
  font-size:1.3rem;
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.feature-content{flex:1}
.feature-title{font-weight:600;font-size:1rem;margin-bottom:2px;color:var(--text-primary);transition:color 0.4s ease}
.feature-desc{font-size:0.8rem;color:var(--text-secondary);transition:color 0.4s ease}
.feature-arrow{
  font-size:1rem;
  color:var(--text-muted);
  transition:transform 0.3s ease, color 0.4s ease;
}
.feature-card:hover .feature-arrow{transform:translateX(4px);color:var(--text-secondary)}

/* Daily preview pill */
.daily-preview{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:14px 16px;
  margin-top:24px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:12px;
  cursor:pointer;touch-action:manipulation;
  transition:all 0.3s ease;
}
.daily-preview:active{transform:scale(0.98);background:var(--surface-hover)}
.daily-preview-label{font-size:0.8rem;color:var(--text-secondary);letter-spacing:0.05em}
.daily-preview-badge{
  font-size:0.75rem;font-weight:600;
  padding:3px 10px;border-radius:10px;
  background:var(--accent-subtle);color:var(--accent);
  border:1px solid var(--surface-border);
}
.daily-preview-arrow{margin-left:auto;color:var(--text-muted);font-size:0.9rem}

/* Date & disclaimer */
.home-footer{
  margin-top:auto;
  padding-top:32px;
  text-align:center;
}
.date-display{
  font-size:0.8rem;
  color:var(--text-muted);
  letter-spacing:0.05em;
  margin-bottom:8px;
  transition:color 0.4s ease;
}
.disclaimer{
  font-size:0.75rem;
  color:var(--accent);
  letter-spacing:0.1em;
  transition:color 0.4s ease;
  opacity:0.6;
}

/* History section */
.history-section{
  width:100%;
  margin-top:24px;
  content-visibility:auto;
}
.history-title{
  font-size:0.75rem;
  color:var(--text-muted);
  letter-spacing:0.15em;
  margin-bottom:0;
  text-transform:uppercase;
  transition:color 0.4s ease;
}
.history-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.history-clear{
  background:none;border:1px solid var(--surface-border);
  color:var(--text-muted);
  font-size:0.7rem;
  padding:4px 12px;
  border-radius:10px;
  cursor:pointer;
  touch-action:manipulation;
  transition:all 0.3s ease;
  font-family:inherit;
}
.history-clear:active{
  background:var(--surface);
  border-color:var(--accent);
  color:var(--accent);
  transform:scale(0.95);
}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:10px;
  cursor:pointer;
  transition:all 0.3s ease;
  touch-action:manipulation;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.history-item:hover{background:var(--surface-hover)}
.history-item:active{transform:scale(0.98)}
.history-date{font-size:0.7rem;color:var(--text-muted);transition:color 0.4s ease}
.history-info{display:flex;align-items:center;gap:8px}
.history-name{font-size:0.85rem;color:var(--text-primary);transition:color 0.4s ease}
.history-fortune{
  font-size:0.7rem;
  padding:2px 8px;
  border-radius:10px;
  font-weight:600;
}

/* Input Screen */
.input-content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  max-width:400px;
}
.input-title{
  font-size:1.5rem;font-weight:600;
  color:var(--accent);
  margin-bottom:8px;
  letter-spacing:0.15em;
  transition:color 0.4s ease;
}
.input-desc{
  font-size:0.85rem;
  color:var(--text-secondary);
  margin-bottom:28px;
  text-align:center;
  transition:color 0.4s ease;
}
.question-area{
  width:100%;
  min-height:120px;
  padding:16px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:12px;
  color:var(--text-primary);
  font-size:1rem;
  line-height:1.8;
  resize:none;
  outline:none;
  transition:border-color 0.3s,box-shadow 0.3s, background 0.4s ease, color 0.4s ease;
  touch-action:manipulation;
  font-family:inherit;
}
.question-area::placeholder{color:var(--text-muted)}
.question-area:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-subtle);
}
.question-area.shake{animation:shake 0.4s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)}
}
.char-count{
  width:100%;
  text-align:right;
  font-size:0.7rem;
  color:var(--text-muted);
  margin-top:6px;
  transition:color 0.4s ease;
}
.suggestion-chips{
  display:flex;flex-wrap:wrap;gap:8px;
  width:100%;margin-top:12px;
  opacity:0;
  animation:chipFadeIn 0.3s ease 0.2s forwards;
}
@keyframes chipFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chip{
  padding:8px 16px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:20px;
  font-size:0.85rem;
  color:var(--text-secondary);
  cursor:pointer;
  transition:all 0.3s ease;
  touch-action:manipulation;
  font-family:inherit;
}
.chip:hover{background:var(--accent-subtle);border-color:var(--accent);color:var(--accent)}
.chip:active{transform:scale(0.95)}

/* Buttons */
.btn-primary{
  width:100%;max-width:320px;
  padding:14px 32px;margin-top:28px;
  background:var(--btn-bg);
  border:none;border-radius:50px;
  color:var(--btn-text);
  font-size:1rem;font-weight:600;
  letter-spacing:0.15em;
  cursor:pointer;touch-action:manipulation;
  transition:all 0.3s ease;
  box-shadow:0 4px 20px var(--accent-glow);
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;
  position:relative;
  overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;
  top:50%;left:50%;
  width:0;height:0;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
  opacity:0;
}
.btn-primary:active::after{
  width:200px;height:200px;opacity:1;
  transition:width 0s, height 0s, opacity 0s;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 2px 10px var(--accent-glow)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-secondary{
  width:100%;max-width:320px;
  padding:12px 32px;margin-top:12px;
  background:transparent;
  border:1px solid var(--surface-border);
  border-radius:50px;
  color:var(--text-secondary);
  font-size:0.9rem;font-weight:600;
  letter-spacing:0.1em;
  cursor:pointer;touch-action:manipulation;
  transition:all 0.3s ease;
  font-family:inherit;
}
.btn-secondary:active{background:var(--surface);transform:scale(0.97)}
.btn-text{
  background:none;border:none;
  color:var(--text-secondary);
  font-size:0.85rem;cursor:pointer;
  touch-action:manipulation;
  padding:8px 16px;
  transition:color 0.3s ease;
  font-family:inherit;
}
.btn-text:hover{color:var(--accent)}
.btn-text:active{transform:scale(0.97)}

/* Loading */
.loading-container{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  flex:1;gap:32px;
}
.loading-container.active{display:flex}
.loading-animation{
  position:relative;width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
}
.loading-circle{
  position:absolute;border-radius:50%;
  border:1px solid var(--accent-glow);
  animation:pulseCircle 2s ease-in-out infinite;
  transition:border-color 0.4s ease;
}
.loading-circle:nth-child(1){width:100px;height:100px;animation-delay:0s}
.loading-circle:nth-child(2){width:70px;height:70px;animation-delay:0.2s}
.loading-circle:nth-child(3){width:40px;height:40px;animation-delay:0.4s}
@keyframes pulseCircle{
  0%,100%{opacity:0.3;transform:scale(1)}
  50%{opacity:0.6;transform:scale(1.05)}
}
.loading-trigram{
  font-size:2rem;color:var(--accent);
  transition:color 0.4s ease, opacity 0.3s ease;
}
.loading-text{
  font-size:1rem;color:var(--accent);
  letter-spacing:0.2em;min-height:1.6em;text-align:center;
  transition:color 0.4s ease;
}
.countdown{
  font-size:3rem;font-weight:700;color:var(--accent);
  animation:countdownPulse 1s ease-in-out infinite;
  transition:color 0.4s ease;
}
@keyframes countdownPulse{
  0%,100%{opacity:0.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.1)}
}

/* ===== Card Flip (今日一签) ===== */
.card-flip-container{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;
  perspective:1000px;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:200;
  background:#000;
}
.card-flip-container.active{
  display:flex;
}
.card-flip-container.active ~ .theme-toggle,
.card-flip-container.active ~ .date-display{
  opacity:0;pointer-events:none;
}
/* Full-screen golden light overlay */
.flip-golden-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:50;pointer-events:none;
  background:radial-gradient(circle at 50% 50%,rgba(212,175,55,0.9) 0%,rgba(212,175,55,0.4) 30%,rgba(180,130,20,0.15) 60%,transparent 80%);
  opacity:0;
  transform:scale(0);
  border-radius:50%;
}
.flip-golden-overlay.active{
  animation:goldenExpand 2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes goldenExpand{
  0%{opacity:0;transform:scale(0)}
  15%{opacity:1;transform:scale(0.3)}
  50%{opacity:0.8;transform:scale(1.5)}
  100%{opacity:0.6;transform:scale(3)}
}
/* Secondary golden ring */
.flip-golden-ring{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100px;height:100px;
  border:2px solid rgba(212,175,55,0.6);
  border-radius:50%;
  z-index:51;pointer-events:none;
  opacity:0;
}
.flip-golden-ring.active{
  animation:ringExpand 1.5s 0.1s ease-out forwards;
}
@keyframes ringExpand{
  0%{opacity:0.8;width:100px;height:100px}
  100%{opacity:0;width:800px;height:800px}
}
/* Third ring delayed */
.flip-golden-ring2{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100px;height:100px;
  border:1px solid rgba(212,175,55,0.4);
  border-radius:50%;
  z-index:51;pointer-events:none;
  opacity:0;
}
.flip-golden-ring2.active{
  animation:ringExpand 1.8s 0.3s ease-out forwards;
}
/* Golden particles */
.flip-golden-particles{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:52;pointer-events:none;
  overflow:hidden;
}
.golden-particle{
  position:absolute;
  width:3px;height:3px;
  background:rgba(212,175,55,0.9);
  border-radius:50%;
  opacity:0;
  box-shadow:0 0 6px rgba(212,175,55,0.6);
}
.golden-particle.active{
  animation:particleFly var(--duration) var(--delay) ease-out forwards;
}
@keyframes particleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}
}
/* Screen flash */
.flip-screen-flash{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:49;pointer-events:none;
  background:rgba(212,175,55,0.3);
  opacity:0;
}
.flip-screen-flash.active{
  animation:screenFlash 0.4s ease-out forwards;
}
@keyframes screenFlash{
  0%{opacity:0}15%{opacity:1}100%{opacity:0}
}
.flip-card{
  width:220px;height:320px;
  position:relative;z-index:60;
  cursor:pointer;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  transform-style:preserve-3d;
  transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-card:hover:not(.flipped){transform:rotateY(8deg)}
.flip-card:active:not(.flipped){transform:scale(0.97)}
.flip-face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:16px;
  overflow:hidden;
}
/* Card Back - dark mysterious design */
.flip-back{
  background:linear-gradient(145deg,#1a1a1a,#0d0d0d);
  border:2px solid rgba(212,175,55,0.3);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
  box-shadow:0 0 40px rgba(212,175,55,0.1),0 8px 32px rgba(0,0,0,0.5);
  transition:border-color 0.4s ease, box-shadow 0.4s ease;
}
.flip-back-pattern{
  width:140px;height:140px;
  border:2px solid rgba(212,175,55,0.4);
  border-radius:50%;
  opacity:0.4;
  position:relative;
  animation:backGlow 3s ease-in-out infinite;
}
.flip-back-pattern::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100px;height:100px;
  border:1px solid rgba(212,175,55,0.3);
  border-radius:50%;
  opacity:0.5;
}
.flip-back-pattern::after{
  content:'易';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2.5rem;color:rgba(212,175,55,0.6);opacity:0.6;
  font-family:"Noto Serif SC",serif;
}
@keyframes backGlow{
  0%,100%{opacity:0.3;transform:scale(1);box-shadow:0 0 20px rgba(212,175,55,0.1)}
  50%{opacity:0.5;transform:scale(1.05);box-shadow:0 0 40px rgba(212,175,55,0.2)}
}
.flip-back-text{
  font-size:0.85rem;color:rgba(212,175,55,0.5);
  letter-spacing:0.3em;
}
.flip-back-hint{
  font-size:0.7rem;color:rgba(212,175,55,0.3);
  letter-spacing:0.1em;
  animation:hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse{
  0%,100%{opacity:0.2}50%{opacity:0.6}
}
/* Card Front - golden reveal */
.flip-front{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,#1a1a1a,#0d0d0d);
  border:2px solid rgba(212,175,55,0.6);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;
  padding:24px 20px;
  box-shadow:0 0 60px rgba(212,175,55,0.3),0 0 120px rgba(212,175,55,0.1);
}
.flip-front-name{
  font-size:3rem;font-weight:700;
  color:#d4af37;
  letter-spacing:0.15em;
  font-family:"Noto Serif SC",serif;
  text-shadow:0 0 20px rgba(212,175,55,0.4);
}
.flip-front-fullname{
  font-size:0.9rem;color:rgba(212,175,55,0.6);
  letter-spacing:0.1em;
}
.flip-front-badge{
  display:inline-block;
  padding:6px 24px;border-radius:50px;
  font-size:1rem;font-weight:700;
  letter-spacing:0.15em;
  margin-top:8px;
  color:#d4af37;
  border:1px solid rgba(212,175,55,0.3);
  background:rgba(212,175,55,0.1);
}
.flip-front-judgment{
  font-size:0.85rem;color:rgba(255,255,255,0.7);
  text-align:center;
  line-height:1.8;
  max-width:180px;
  margin-top:8px;
}
.flip-front-lines{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  margin-bottom:8px;
  font-size:1.1rem;
  letter-spacing:0.15em;
  color:#d4af37;
  text-shadow:0 0 8px rgba(212,175,55,0.3);
}
/* Card flip text */
.flip-text{
  font-size:0.85rem;color:rgba(212,175,55,0.5);
  letter-spacing:0.15em;text-align:center;
  min-height:1.6em;
  z-index:60;
  transition:all 0.4s ease;
}
.flip-text.revealed{
  color:rgba(212,175,55,0.8);
  font-size:1rem;
}
/* Flip action buttons */
.flip-actions{
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
  z-index:60;
}
.flip-btn-primary{
  padding:12px 36px;
  background:linear-gradient(135deg,#d4af37,#b8941f);
  color:#000;
  border:none;border-radius:50px;
  font-size:0.9rem;font-weight:600;
  cursor:pointer;touch-action:manipulation;
  font-family:inherit;
  letter-spacing:0.1em;
  transition:all 0.3s ease;
  box-shadow:0 0 20px rgba(212,175,55,0.3);
}
.flip-btn-primary:active{transform:scale(0.95);opacity:0.85}
.flip-btn-secondary{
  background:none;border:none;
  color:rgba(212,175,55,0.5);
  font-size:0.8rem;
  cursor:pointer;touch-action:manipulation;
  font-family:inherit;
  letter-spacing:0.1em;
  transition:color 0.3s ease;
}
.flip-btn-secondary:active{color:rgba(212,175,55,0.8)}

/* Result Screen */
.result-content{
  flex:1;display:flex;flex-direction:column;
  align-items:center;width:100%;max-width:400px;
  padding-bottom:20px;
}
.result-header{
  width:100%;display:flex;align-items:center;
  justify-content:space-between;padding:8px 0 16px;margin-bottom:8px;
}
.result-header-title{
  font-size:1.1rem;font-weight:600;
  color:var(--accent);letter-spacing:0.1em;
  transition:color 0.4s ease;
}
.header-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--surface-border);
  border-radius:10px;color:var(--text-primary);font-size:1.1rem;
  cursor:pointer;touch-action:manipulation;transition:all 0.3s ease;
}
.header-btn:hover{background:var(--surface-hover);border-color:var(--accent)}
.header-btn:active{transform:scale(0.95)}

/* Result cards */
.result-card{
  width:100%;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:14px;
  padding:24px 20px;
  margin-bottom:14px;
  opacity:0;
  animation:cardReveal 0.3s ease forwards;
  will-change:opacity;
  transition:background 0.4s ease, border-color 0.4s ease;
}
@keyframes cardReveal{from{opacity:0}to{opacity:1}}
.result-card.delay1{animation-delay:0.05s}
.result-card.delay2{animation-delay:0.1s}
.result-card.delay3{animation-delay:0.15s}
.result-card.delay4{animation-delay:0.2s}

/* Hexagram Display */
.hexagram-glow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:200px;height:200px;
  background:radial-gradient(circle,var(--accent-glow),transparent 70%);
  opacity:0.5;pointer-events:none;
}
.hexagram-display{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:16px 0;
}
.hex-line{
  display:flex;align-items:center;justify-content:center;
  height:6px;width:100px;
  opacity:0;animation:lineAppear 0.3s ease forwards;
  will-change:opacity,transform;
}
.hex-line:nth-child(1){animation-delay:0.6s}
.hex-line:nth-child(2){animation-delay:0.48s}
.hex-line:nth-child(3){animation-delay:0.36s}
.hex-line:nth-child(4){animation-delay:0.24s}
.hex-line:nth-child(5){animation-delay:0.12s}
.hex-line:nth-child(6){animation-delay:0s}
@keyframes lineAppear{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
.hex-line.yang{
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  border-radius:4px;
  box-shadow:0 0 10px var(--accent-glow);
  transition:background 0.4s ease, box-shadow 0.4s ease;
}
.hex-line.yin{background:transparent;position:relative}
.hex-line.yin::before,.hex-line.yin::after{
  content:'';position:absolute;top:0;height:6px;width:38%;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  border-radius:4px;
  box-shadow:0 0 10px var(--accent-glow);
  transition:background 0.4s ease, box-shadow 0.4s ease;
}
.hex-line.yin::before{left:0}
.hex-line.yin::after{right:0}

.hexagram-name{
  font-size:2.8rem;font-weight:700;
  color:var(--accent);margin-top:16px;
  letter-spacing:0.1em;
  transition:color 0.4s ease;
}
.hexagram-fullname{
  font-size:0.95rem;color:var(--text-secondary);
  margin-top:4px;letter-spacing:0.05em;
  transition:color 0.4s ease;
}
.daily-sign{
  font-size:0.8rem;color:var(--text-muted);
  margin-top:8px;letter-spacing:0.05em;
  transition:color 0.4s ease;
}
.fortune-badge{
  display:inline-block;
  padding:8px 28px;border-radius:50px;
  font-size:1.1rem;font-weight:700;
  letter-spacing:0.15em;margin-top:16px;
  opacity:0;animation:badgeFadeIn 0.5s ease forwards;
  animation-delay:0.6s;
  will-change:opacity;
}
@keyframes badgeFadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

/* Fortune colors - Black & Gold theme (default) */
.fortune-大吉{color:#f0e6d3;background:#f0c040;box-shadow:0 0 20px rgba(240,192,64,0.3)}
.fortune-吉{color:#f0e6d3;background:#4ade80;box-shadow:0 0 20px rgba(74,222,128,0.3)}
.fortune-中吉{color:#f0e6d3;background:#34d399;box-shadow:0 0 20px rgba(52,211,153,0.3)}
.fortune-小吉{color:#f0e6d3;background:#2dd4bf;box-shadow:0 0 20px rgba(45,212,191,0.3)}
.fortune-平{color:#f0e6d3;background:#94a3b8;box-shadow:0 0 20px rgba(148,163,184,0.3)}
.fortune-小凶{color:#f0e6d3;background:#fb923c;box-shadow:0 0 20px rgba(251,146,60,0.3)}
.fortune-凶{color:#f0e6d3;background:#f87171;box-shadow:0 0 20px rgba(248,113,113,0.3)}
.fortune-大凶{color:#f0e6d3;background:#ef4444;box-shadow:0 0 20px rgba(239,68,68,0.3)}

/* Fortune colors - Dark theme */
html.theme-dark .fortune-大吉{color:#c9a96e;border:1px solid rgba(201,169,110,0.3);background:rgba(201,169,110,0.08);box-shadow:none}
html.theme-dark .fortune-吉{color:#4a9e6b;border:1px solid rgba(74,158,107,0.3);background:rgba(74,158,107,0.08);box-shadow:none}
html.theme-dark .fortune-中吉{color:#3d8a5c;border:1px solid rgba(61,138,92,0.3);background:rgba(61,138,92,0.08);box-shadow:none}
html.theme-dark .fortune-小吉{color:#5a9e8f;border:1px solid rgba(90,158,143,0.3);background:rgba(90,158,143,0.08);box-shadow:none}
html.theme-dark .fortune-平{color:#8a8a7a;border:1px solid rgba(138,138,122,0.3);background:rgba(138,138,122,0.08);box-shadow:none}
html.theme-dark .fortune-小凶{color:#c47a3a;border:1px solid rgba(196,122,58,0.3);background:rgba(196,122,58,0.08);box-shadow:none}
html.theme-dark .fortune-凶{color:#c44a3a;border:1px solid rgba(196,74,58,0.3);background:rgba(196,74,58,0.08);box-shadow:none}
html.theme-dark .fortune-大凶{color:#a03030;border:1px solid rgba(160,48,48,0.3);background:rgba(160,48,48,0.08);box-shadow:none}

/* Result sections */
.result-section{margin-top:20px}
.section-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--divider),transparent);
  margin:16px 0;
  transition:background 0.4s ease;
}
.result-label{
  font-size:0.75rem;color:var(--accent);
  letter-spacing:0.15em;margin-bottom:8px;
  text-transform:uppercase;font-weight:600;
  transition:color 0.4s ease;
}
.result-text{
  font-size:0.95rem;color:var(--text-primary);
  line-height:1.8;
  transition:color 0.4s ease;
}
.result-text.judgment{
  font-size:1.1rem;color:var(--accent);
  font-weight:600;letter-spacing:0.05em;
}
.result-text.advice{
  padding-left:16px;
  border-left:2px solid var(--accent-glow);
}

/* Daily extras grid */
.daily-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:10px;margin-top:8px;
}
.daily-item{
  padding:14px 10px;
  background:var(--surface);
  border-radius:10px;
  border:1px solid var(--surface-border);
  opacity:0;animation:itemFadeIn 0.3s ease forwards;
  will-change:opacity;
  transition:background 0.4s ease, border-color 0.4s ease;
}
.daily-item:nth-child(1){animation-delay:0.2s;border-left:3px solid #4ade80}
.daily-item:nth-child(2){animation-delay:0.25s;border-left:3px solid #f87171}
.daily-item:nth-child(3){animation-delay:0.3s;border-left:3px solid var(--accent)}
.daily-item:nth-child(4){animation-delay:0.35s;border-left:3px solid var(--accent)}
.daily-item:nth-child(5){animation-delay:0.4s;border-left:3px solid var(--accent)}
.daily-item:nth-child(6){animation-delay:0.45s;border-left:3px solid var(--accent)}
@keyframes itemFadeIn{from{opacity:0}to{opacity:1}}
.daily-item-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;
  background:var(--surface);
  border-radius:50%;
  font-size:0.85rem;
  margin-bottom:6px;
}
.daily-item-label{
  font-size:0.65rem;letter-spacing:0.1em;
  margin-bottom:4px;color:var(--text-secondary);
}
.daily-item-value{font-size:0.85rem;color:var(--text-primary);line-height:1.5}

.question-display{
  font-size:0.85rem;color:var(--text-secondary);
  text-align:center;margin-bottom:8px;font-style:italic;
  max-width:300px;word-break:break-all;
}

.result-buttons{
  display:flex;gap:12px;width:100%;margin-top:8px;
}
.result-buttons .btn-primary,
.result-buttons .btn-secondary{
  flex:1;max-width:none;margin-top:0;
  padding:12px 16px;font-size:0.9rem;
}

/* Resolve card (化解凶相) */
.resolve-card{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:12px;padding:24px 20px;
  border:1px dashed var(--accent);
  background:var(--accent-subtle);
}
.resolve-icon{font-size:2rem;opacity:0.8}
.resolve-text{
  font-size:0.9rem;color:var(--text-secondary);line-height:1.7;
}
.btn-resolve{
  background:var(--btn-bg);color:var(--btn-text);
  border:none;border-radius:50px;padding:10px 28px;
  font-size:0.9rem;cursor:pointer;
  transition:all 0.3s ease;touch-action:manipulation;
}
.btn-resolve:active{transform:scale(0.96);opacity:0.85}

/* Algorithm Card */
.algo-card{
  width:100%;
  border:1px solid var(--surface-border);
  border-radius:12px;
  overflow:hidden;
  background:var(--surface);
}
.algo-toggle{
  display:flex;align-items:center;gap:8px;
  padding:14px 16px;
  cursor:pointer;touch-action:manipulation;
  color:var(--text-muted);
  font-size:0.8rem;
  letter-spacing:0.05em;
  transition:color 0.3s ease;
}
.algo-toggle:active{color:var(--text-secondary)}
.algo-toggle-icon{
  font-size:0.7rem;
  transition:transform 0.3s ease;
  color:var(--accent);opacity:0.6;
}
.algo-toggle-text{opacity:0.7}
.algo-detail{
  padding:0 16px 16px;
  border-top:1px solid var(--divider);
}
.algo-step{
  padding:12px 0;
  border-bottom:1px solid var(--divider);
}
.algo-step:last-of-type{border-bottom:none}
.algo-step-label{
  font-size:0.75rem;
  color:var(--accent);
  font-weight:600;
  letter-spacing:0.05em;
  margin-bottom:6px;
}
.algo-step-code{
  font-family:'Courier New',Courier,monospace;
  font-size:0.75rem;
  color:var(--text-primary);
  background:rgba(128,128,128,0.08);
  padding:6px 10px;
  border-radius:6px;
  margin-bottom:4px;
  word-break:break-all;
  line-height:1.5;
}
.algo-step-desc{
  font-size:0.7rem;
  color:var(--text-muted);
  line-height:1.5;
}
.algo-note{
  margin-top:12px;
  font-size:0.7rem;
  color:var(--text-muted);
  text-align:center;
  letter-spacing:0.05em;
  opacity:0.7;
  padding-top:8px;
  border-top:1px dashed var(--divider);
}

/* Toast */
.toast{
  position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--toast-bg);color:var(--toast-text);
  padding:12px 24px;border-radius:50px;
  font-size:0.9rem;font-weight:600;z-index:1000;
  opacity:0;transition:all 0.3s ease;
  will-change:transform,opacity;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Match Screen ===== */
.match-input-area{
  width:100%;max-width:400px;
  display:flex;flex-direction:column;gap:24px;
}
.match-person{
  width:100%;
  padding:20px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:14px;
  transition:background 0.4s ease, border-color 0.4s ease;
}
.match-person-label{
  font-size:0.75rem;color:var(--accent);
  letter-spacing:0.15em;margin-bottom:12px;font-weight:600;
  transition:color 0.4s ease;
}
.match-input{
  width:100%;
  padding:10px 14px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:8px;
  color:var(--text-primary);
  font-size:0.95rem;
  outline:none;
  transition:all 0.3s ease;
  font-family:inherit;
  margin-bottom:10px;
}
.match-input::placeholder{color:var(--text-muted)}
.match-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
.match-input[type="date"]{color-scheme:dark}
html.theme-dark .match-input[type="date"]{color-scheme:dark}
.btn-test{
  background:none;border:1px solid var(--surface-border);
  color:var(--text-secondary);
  padding:8px 20px;border-radius:20px;
  font-size:0.8rem;cursor:pointer;
  transition:all 0.3s ease;touch-action:manipulation;
  font-family:inherit;
}
.btn-test:hover{border-color:var(--accent);color:var(--accent)}
.btn-test:active{transform:scale(0.95)}

/* Match Result */
.match-score-ring{
  width:160px;height:160px;
  position:relative;margin:0 auto 16px;
}
.match-score-ring svg{
  width:100%;height:100%;
  transform:rotate(-90deg);
}
.match-score-ring .ring-bg{
  fill:none;stroke:var(--surface-border);stroke-width:6;
}
.match-score-ring .ring-fill{
  fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s ease;
}
.match-score-number{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2.5rem;font-weight:700;
  color:var(--text-primary);
  transition:color 0.4s ease;
}
.match-score-unit{
  font-size:1rem;font-weight:400;
  color:var(--text-secondary);
}
.match-level{
  text-align:center;font-size:1.2rem;
  color:var(--accent);font-weight:600;
  letter-spacing:0.15em;margin-bottom:20px;
  transition:color 0.4s ease;
}
.match-dimension{
  margin-bottom:14px;
}
.match-dimension-header{
  display:flex;justify-content:space-between;
  margin-bottom:6px;
}
.match-dimension-label{
  font-size:0.85rem;color:var(--text-secondary);
  transition:color 0.4s ease;
}
.match-dimension-value{
  font-size:0.85rem;color:var(--text-primary);font-weight:600;
  transition:color 0.4s ease;
}
.match-dimension-bar{
  width:100%;height:4px;
  background:var(--surface);border-radius:2px;
  overflow:hidden;
  transition:background 0.4s ease;
}
.match-dimension-fill{
  height:100%;border-radius:2px;
  transition:width 0.8s ease;
}
.match-summary{
  font-size:0.95rem;color:var(--text-primary);
  line-height:1.8;margin-top:16px;
  padding:16px;background:var(--surface);
  border-radius:10px;border:1px solid var(--surface-border);
  transition:all 0.4s ease;
}

/* ===== Wooden Fish Screen ===== */
.woodenfish-content{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;max-width:400px;gap:20px;
  padding-top:10px;
}
.woodenfish-area{
  position:relative;
  width:220px;height:220px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}
.woodenfish-svg{
  width:190px;height:190px;
  transition:transform 0.1s ease;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,0.4));
}
.woodenfish-area:active .woodenfish-svg{transform:scale(0.93)}
.woodenfish-area.knocking .woodenfish-svg{
  animation:fishKnock 0.2s ease;
}
@keyframes fishKnock{
  0%{transform:scale(1) rotate(0deg)}
  40%{transform:scale(0.9) rotate(-2deg)}
  70%{transform:scale(1.03) rotate(1deg)}
  100%{transform:scale(1) rotate(0deg)}
}
.woodenfish-ripple,
.woodenfish-ripple2{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:190px;height:190px;
  border:2px solid var(--accent);
  border-radius:50%;
  opacity:0;
  pointer-events:none;
}
.woodenfish-ripple.active{
  animation:rippleOut 0.6s ease forwards;
}
.woodenfish-ripple2.active{
  animation:rippleOut 0.6s ease 0.15s forwards;
}
@keyframes rippleOut{
  0%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.6)}
}
.woodenfish-glow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(200,160,60,0.4) 0%, rgba(200,160,60,0) 70%);
  opacity:0;pointer-events:none;
}
.woodenfish-glow.active{
  animation:glowPulse 0.4s ease forwards;
}
@keyframes glowPulse{
  0%{opacity:0.8}100%{opacity:0}
}
.merit-float{
  position:absolute;
  color:var(--accent);
  font-size:1.2rem;font-weight:700;
  pointer-events:none;
  animation:floatUp 1s ease forwards;
  z-index:10;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(0.6)}
}
.merit-section{
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
}
.merit-counter{
  font-size:2.2rem;font-weight:300;
  color:var(--text-primary);
  letter-spacing:0.08em;
  transition:color 0.4s ease, transform 0.15s ease;
}
.merit-counter.bounce{animation:meritBounce 0.2s ease}
@keyframes meritBounce{
  0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}
}
.merit-today{
  font-size:0.8rem;color:var(--text-muted);
  transition:color 0.4s ease;
}
.merit-mantra{
  font-size:0.9rem;
  color:var(--accent);
  letter-spacing:0.3em;
  opacity:0.4;
  margin-top:2px;
}
.woodenfish-controls{
  border-top:1px solid var(--divider);
  padding-top:20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  width:100%;margin-top:8px;
}
.auto-toggle{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:10px;
  cursor:pointer;touch-action:manipulation;
  transition:all 0.3s ease;
  font-family:inherit;
  color:var(--text-primary);
  font-size:0.9rem;
}
.auto-toggle:hover{background:var(--surface-hover)}
.auto-toggle:active{transform:scale(0.97)}
.auto-toggle.active{
  border-color:var(--accent);
  background:var(--accent-subtle);
}
.auto-indicator{
  width:36px;height:20px;
  border-radius:10px;
  background:var(--surface-border);
  position:relative;
  transition:background 0.3s ease;
}
.auto-toggle.active .auto-indicator{background:var(--accent)}
.auto-indicator::after{
  content:'';position:absolute;
  top:2px;left:2px;
  width:16px;height:16px;
  border-radius:50%;
  background:var(--text-primary);
  transition:transform 0.3s ease, background 0.4s ease;
}
.auto-toggle.active .auto-indicator::after{transform:translateX(16px)}
.speed-selector{
  display:flex;gap:8px;
}
.speed-btn{
  padding:6px 16px;
  background:var(--surface);
  border:1px solid var(--surface-border);
  border-radius:16px;
  color:var(--text-secondary);
  font-size:0.8rem;cursor:pointer;
  transition:all 0.3s ease;touch-action:manipulation;
  font-family:inherit;
}
.speed-btn:hover{border-color:var(--accent);color:var(--accent)}
.speed-btn:active{transform:scale(0.95)}
.speed-btn.active{
  background:var(--accent-subtle);
  border-color:var(--accent);
  color:var(--accent);
}
.woodenfish-actions{
  display:flex;gap:12px;
}

/* Responsive */
/* Extra small screens (320px+) - default styles already handle this */

/* Small phones (375px+) */
@media(min-width:375px){
  .main-title{font-size:3rem}
  .hex-line{width:120px}
  .hexagram-name{font-size:2.4rem}
  .woodenfish-area{width:200px;height:200px}
  .woodenfish-svg{width:170px;height:170px}
  .match-score-ring{width:150px;height:150px}
  .match-score-number{font-size:2.2rem}
}

/* Standard phones (414px+) */
@media(min-width:414px){
  .main-title{font-size:3.5rem}
  .hex-line{width:140px}
  .hex-line{height:8px}
  .hexagram-name{font-size:2.8rem}
  .woodenfish-area{width:220px;height:220px}
  .woodenfish-svg{width:190px;height:190px}
  .match-score-ring{width:160px;height:160px}
  .match-score-number{font-size:2.5rem}
  .result-card,.match-input-area{max-width:420px}
}

/* Tablets (768px+) */
@media(min-width:768px){
  .screen{padding:40px 24px}
  .main-title{font-size:3.5rem}
  .home-content,.input-content,.result-content,.match-input-area,.woodenfish-content{max-width:480px}
  .hex-line{width:160px;height:10px}
  .hex-line.yin::before,.hex-line.yin::after{height:10px}
  .hexagram-name{font-size:3rem}
  .woodenfish-area{width:240px;height:240px}
  .woodenfish-svg{width:210px;height:210px}
  .match-score-ring{width:180px;height:180px}
  .match-score-number{font-size:2.8rem}
  .match-input-area{flex-direction:row;gap:24px}
  .match-person{flex:1}
}

/* Desktop (1024px+) */
@media(min-width:1024px){
  .screen{padding:48px 32px}
  .home-content,.input-content,.result-content,.match-input-area,.woodenfish-content{max-width:520px}
  .hex-line{width:180px;height:10px}
  .hex-line.yin::before,.hex-line.yin::after{height:10px}
  .hexagram-name{font-size:3.2rem}
  .woodenfish-area{width:260px;height:260px}
  .woodenfish-svg{width:230px;height:230px}
  .match-score-ring{width:200px;height:200px}
  .match-score-number{font-size:3rem}
}

/* Very small screens (320px and below) */
@media(max-width:374px){
  .main-title{font-size:2.4rem}
  .hex-line{width:100px}
  .hex-line{height:5px}
  .hex-line.yin::before,.hex-line.yin::after{height:5px}
  .hexagram-name{font-size:2rem}
  .hexagram-fullname{font-size:0.85rem}
  .feature-card{padding:14px 0}
  .feature-icon{font-size:1.2rem}
  .feature-title{font-size:0.9rem}
  .feature-desc{font-size:0.75rem}
  .woodenfish-area{width:180px;height:180px}
  .woodenfish-svg{width:155px;height:155px}
  .match-score-ring{width:130px;height:130px}
  .match-score-number{font-size:2rem}
  .match-input-area{gap:16px}
  .btn-primary,.btn-secondary{padding:12px 20px;font-size:0.9rem}
  .daily-grid{grid-template-columns:1fr 1fr}
  .result-card{padding:16px}
  .question-area{min-height:100px}
}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    transition-duration:0.01ms!important;
  }
}
</style>
</head>

      <svg class="woodenfish-svg" id="woodenfish-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Wooden fish body - top view, realistic shape -->
        <defs>
          <radialGradient id="wfGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#a07830"/>
            <stop offset="40%" stop-color="#7a5a28"/>
            <stop offset="75%" stop-color="#5c4020"/>
            <stop offset="100%" stop-color="#3e2a15"/>
          </radialGradient>
          <radialGradient id="wfInner" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4a3518"/>
            <stop offset="100%" stop-color="#2a1a0a"/>
          </radialGradient>
          <filter id="wfShadow">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
          </filter>
        </defs>
        <!-- Main body - round fish shape viewed from top -->
        <ellipse cx="100" cy="105" rx="75" ry="65" fill="url(#wfGrad)" filter="url(#wfShadow)"/>
        <!-- Tail section -->
        <path d="M 30 105 Q 10 90 15 75 Q 25 85 35 95" fill="#6b4c22" opacity="0.8"/>
        <path d="M 30 105 Q 10 120 15 135 Q 25 125 35 115" fill="#5c4020" opacity="0.8"/>
        <!-- Head bump -->
        <ellipse cx="130" cy="95" rx="30" ry="25" fill="#8a6828" opacity="0.6"/>
        <!-- Mouth opening (the slit where the mallet hits) -->
        <ellipse cx="100" cy="100" rx="22" ry="16" fill="url(#wfInner)"/>
        <!-- Mouth slit line -->

var currentLang = localStorage.getItem('iching_lang') || 'zh';
function t(key) { return (LANG[currentLang] && LANG[currentLang][key]) || (LANG.zh[key]) || key; }
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('iching_lang', lang);
  updateAllText();
  updateLangLabel();
}
function updateLangLabel() {
  var btns = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  var activeBtn = document.getElementById('lang-' + currentLang);
  if (activeBtn) activeBtn.classList.add('active');
}
function cycleLang() {
  var langs = ['zh', 'en', 'ja'];
  var idx = langs.indexOf(currentLang);
  setLang(langs[(idx + 1) % langs.length]);
}
function setText(id, text) {
  var el = document.getElementById(id);
  if (el) el.textContent = text;
}
function updateAllText() {
  document.title = t('appName');
  var themeLabel = document.getElementById('theme-label');
  if (themeLabel) themeLabel.textContent = document.documentElement.classList.contains('theme-dark') ? t('themeLight') : t('themeDark');
  setText('home-title', t('appName'));
  setText('home-tagline', t('tagline'));
  setText('home-subtitle', t('subtitle'));
  var featureTitles = document.querySelectorAll('.feature-title');
  var featureDescs = document.querySelectorAll('.feature-desc');
  if (featureTitles[0]) featureTitles[0].textContent = t('dailyFortune');
  if (featureDescs[0]) featureDescs[0].textContent = t('dailyFortuneDesc');
  if (featureTitles[1]) featureTitles[1].textContent = t('divination');
  if (featureDescs[1]) featureDescs[1].textContent = t('divinationDesc');
  if (featureTitles[2]) featureTitles[2].textContent = t('matchTitle');
  if (featureDescs[2]) featureDescs[2].textContent = t('matchDesc');
  if (featureTitles[3]) featureTitles[3].textContent = t('woodenFish');
  if (featureDescs[3]) featureDescs[3].textContent = t('woodenFishDesc');
  setText('daily-preview-label', t('todayFortune'));
  setText('daily-preview-badge', t('clickToFlip'));
  setText('history-title-text', t('recentRecords'));
  var clearBtn = document.querySelector('.history-clear');
  if (clearBtn) clearBtn.textContent = t('clear');
  var disclaimer = document.querySelector('.home-footer .disclaimer');
  if (disclaimer) disclaimer.textContent = t('disclaimer');
  updateDateDisplay();
  setText('input-title', t(currentMode === 'daily' ? 'dailyFortune' : 'divination'));
  setText('input-desc', t(currentMode === 'daily' ? '' : 'divinationDesc2'));
  var qInput = document.getElementById('question-input');
  if (qInput) qInput.placeholder = t('questionPlaceholder');
  var chips = document.querySelectorAll('.chip');
  var chipTexts = [t('career'), t('love'), t('wealth'), t('study'), t('health')];
  for (var i = 0; i < chips.length && i < chipTexts.length; i++) {
    chips[i].textContent = chipTexts[i];
  }
  setText('start-btn', t('startDivination'));
  setText('result-header-title', t('divinationResult'));
  setText('match-input-title', t('matchTitle'));
  setText('match-input-desc', t('matchInputDesc'));
  var matchLabels = document.querySelectorAll('.match-person-label');
  if (matchLabels[0]) matchLabels[0].textContent = t('partyA');
  if (matchLabels[1]) matchLabels[1].textContent = t('partyB');
  var matchInputs = document.querySelectorAll('.match-input');
  if (matchInputs[0]) matchInputs[0].placeholder = t('partyAName');
  if (matchInputs[1]) matchInputs[1].placeholder = t('partyBName');
  setText('match-start-btn', t('startMatch'));
  var testBtn = document.querySelector('.btn-test');
  if (testBtn) testBtn.textContent = t('testBtn');
  setText('match-result-title', t('matchResult'));
  updateMeritDisplay();
  var autoToggle = document.getElementById('auto-toggle');
  if (autoToggle) autoToggle.querySelector('span').textContent = t('autoKnock');
  var speedBtns = document.querySelectorAll('.speed-btn');
  if (speedBtns[0]) speedBtns[0].textContent = t('slow');
  if (speedBtns[1]) speedBtns[1].textContent = t('medium');
  if (speedBtns[2]) speedBtns[2].textContent = t('fast');
  setText('flip-back-text', t('cardBackText'));
  setText('flip-back-hint', t('cardBackHint'));
  var algoToggles = document.querySelectorAll('.algo-toggle-text');
  for (var i = 0; i < algoToggles.length; i++) {
    algoToggles[i].textContent = t('viewAlgo');
  }
  var backBtns = document.querySelectorAll('.btn-text');
  for (var i = 0; i < backBtns.length; i++) {
    if (backBtns[i].textContent.indexOf('返回') >= 0 || backBtns[i].textContent.indexOf('Back') >= 0 || backBtns[i].textContent.indexOf('戻る') >= 0 || backBtns[i].textContent.indexOf('ホーム') >= 0 || backBtns[i].textContent.indexOf('Home') >= 0) {
      backBtns[i].textContent = t('backHome');
    } else if (backBtns[i].textContent.indexOf('清零') >= 0 || backBtns[i].textContent.indexOf('Reset') >= 0 || backBtns[i].textContent.indexOf('リセット') >= 0) {
      backBtns[i].textContent = t('resetMerit');
    }
  }
}

// ===== PRNG =====
function seededRandom(seed) {
  let s = Math.abs(seed) || 1;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function pickRandom(rng, arr, count) {
  const shuffled = [...arr].sort(function() { return rng() - 0.5; });
  return shuffled.slice(0, count);
}

function getHexagram(rng) {
  var index = Math.floor(rng() * 64);
  return HEXAGRAMS[index];
}

function updateDateDisplay() {
  var d = new Date();

  var h = d.getHours();
  var m = d.getMinutes();
  var period = h < 12 ? t('am') : t('pm');
  var h12 = h % 12 || 12;
  var timeStr = period + h12 + ':' + (m < 10 ? '0' : '') + m;
  var wd = t('weekday');
  var weekday = t('you') + wd[d.getDay()];

}

// ===== History =====
function saveToHistory(result) {
  var history = JSON.parse(localStorage.getItem('iching_history') || '[]');
  var now = new Date();
  var item = {
    date: now.getTime(),
    dateStr: (now.getMonth() + 1) + '/' + now.getDate(),
    type: result.type || 'divination',
    hexagram: result.hexagram ? result.hexagram.name : '',
    fullName: result.hexagram ? result.hexagram.fullName : '',
    fortune: result.hexagram ? result.hexagram.fortune : '',
    mode: currentMode,
    question: result.question || ''
  };
  if (result.type === 'match') {
    item.nameA = result.nameA;
    item.nameB = result.nameB;
    item.matchScore = result.overall;
    item.matchLevel = result.level;
  }
  history.unshift(item);
  if (history.length > 10) {
    history = history.slice(0, 10);
  }
  localStorage.setItem('iching_history', JSON.stringify(history));
}

function clearHistory() {
  localStorage.removeItem('iching_history');
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('history-list').innerHTML = '';
  showToast(t('historyCleared'));
}

function loadHistory() {
  var history = JSON.parse(localStorage.getItem('iching_history') || '[]');
  var section = document.getElementById('history-section');
  var list = document.getElementById('history-list');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = '';

  var displayCount = Math.min(3, history.length);
  for (var i = 0; i < displayCount; i++) {
    var item = history[i];
    var div = document.createElement('div');
    div.className = 'history-item';
    div.onclick = (function(h) {
      return function() { viewHistoryItem(h); };
    })(item);
    if (item.type === 'match') {
      div.innerHTML =
        '<div class="history-info">' +
          '<span class="history-name">💫 ' + escapeHtml(item.nameA) + ' & ' + escapeHtml(item.nameB) + '</span>' +
          '<span class="history-fortune" style="color:var(--accent);background:var(--accent-subtle);border:1px solid var(--surface-border)">' + escapeHtml(item.matchScore) + '% ' + escapeHtml(item.matchLevel) + '</span>' +
        '</div>' +
        '<div class="history-date">' + escapeHtml(item.dateStr) + '</div>';
    } else {
      var typeIcon = item.type === 'daily' ? '📅 ' : '🔮 ';
      div.innerHTML =
        '<div class="history-info">' +
          '<span class="history-name">' + typeIcon + escapeHtml(item.hexagram) + '</span>' +
          '<span class="history-fortune fortune-' + escapeHtml(item.fortune) + '">' + escapeHtml(item.fortune) + '</span>' +
        '</div>' +
        '<div class="history-date">' + escapeHtml(item.dateStr) + '</div>';
    }
    list.appendChild(div);
  }
}

function viewHistoryItem(item) {
  if (item.type === 'match') {
    // Reconstruct match result from history
    var seed = hashString(item.nameA + (item.dateA || '') + item.nameB + (item.dateB || '') + item.date);
    var rng = seededRandom(seed);
    var match = calculateMatch(item.nameA, item.dateA || '', item.nameB, item.dateB || '');
    currentMatchResult = match;
    currentMatchResult.nameA = item.nameA;
    currentMatchResult.nameB = item.nameB;
    previousScreen = 'screen-home';
    showMatchResult(match, item.nameA, item.nameB);
    return;
  }
  var seed = getTodaySeed() + hashString(item.question || 'daily_' + item.date);
  var rng = seededRandom(seed);
  var hexagram = getHexagram(rng);
  var daily = generateDailyExtras(rng);

  currentMode = item.mode;
  currentResult = { hexagram: hexagram, daily: daily, question: item.question };
  previousScreen = 'screen-home';
  showResult(hexagram, daily, item.question, true);
}

function flipCard() {
  var card = document.getElementById('flip-card');
  if (card.classList.contains('flipped')) return;

  // Fill card front content at flip moment
  if (currentResult && currentResult.hexagram) {
    var hexagram = currentResult.hexagram;
    var linesHtml = '';
    for (var i = 5; i >= 0; i--) {
      linesHtml += hexagram.lines[i] === 1
        ? '<span>▬▬▬▬▬</span>'
        : '<span>▬ ▬ ▬</span>';
    }
    document.getElementById('flip-lines').innerHTML = linesHtml;
    document.getElementById('flip-name').textContent = hexagram.name;
    document.getElementById('flip-fullname').textContent = hexagram.fullName;
    var badge = document.getElementById('flip-badge');
    badge.textContent = hexagram.fortune;
    badge.className = 'flip-front-badge fortune-' + hexagram.fortune;
    document.getElementById('flip-judgment').textContent = hexagram.judgment;
  }

  // Flip the card
  card.classList.add('flipped');

  // Screen flash
  var flash = document.getElementById('flip-screen-flash');
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');

  // Golden overlay expand from center
  var overlay = document.getElementById('flip-golden-overlay');
  overlay.classList.remove('active');
  void overlay.offsetWidth;
  overlay.classList.add('active');

  // Golden rings expand
  var ring = document.getElementById('flip-golden-ring');
  ring.classList.remove('active');
  void ring.offsetWidth;
  ring.classList.add('active');

  var ring2 = document.getElementById('flip-golden-ring2');
  ring2.classList.remove('active');
  void ring2.offsetWidth;
  ring2.classList.add('active');

  // Golden particles scatter
  var particlesContainer = document.getElementById('flip-golden-particles');
  particlesContainer.innerHTML = '';
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div');
    p.className = 'golden-particle';
    var angle = (i / 30) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    var dist = 150 + Math.random() * 300;
    var size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = '50%';
    p.style.top = '50%';
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--duration', (0.8 + Math.random() * 1.2) + 's');
    p.style.setProperty('--delay', (Math.random() * 0.3) + 's');
    particlesContainer.appendChild(p);
    // Trigger animation
    (function(el) {
      setTimeout(function() { el.classList.add('active'); }, 10);
    })(p);
  }

  // Update text
  var flipText = document.getElementById('flip-text');
  flipText.textContent = t('cardRevealed');
  flipText.classList.add('revealed');

  // Show action buttons with JS transition (CSS animation removed due to display:none conflict)
  var actions = document.getElementById('flip-actions');
  actions.style.display = 'flex';
  actions.style.opacity = '0';
  actions.style.transform = 'translateY(16px)';
  setTimeout(function() {
    actions.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    actions.style.opacity = '1';
    actions.style.transform = 'translateY(0)';
  }, 100);

  // Play knock sound
  playKnock();
}

  var nameA = document.getElementById('match-name-a').value.trim();
  var nameB = document.getElementById('match-name-b').value.trim();

}

function calculateMatch(nameA, dateA, nameB, dateB) {
  var seed = hashString(nameA + dateA + nameB + dateB);
  var rng = seededRandom(seed);

  var personality = Math.floor(rng() * 40) + 55;
  var emotional = Math.floor(rng() * 40) + 55;
  var career = Math.floor(rng() * 40) + 55;
  var values = Math.floor(rng() * 40) + 55;

  var overall = Math.round((personality + emotional + career + values) / 4);

  var levels = [
    [90, t('matchLevel1')], [80, t('matchLevel2')], [70, t('matchLevel3')],
    [60, t('matchLevel4')], [50, t('matchLevel5')], [40, t('matchLevel6')],
    [30, t('matchLevel7')], [0, t('matchLevel8')]
  ];
  var level = t('matchLevel8');
  for (var i = 0; i < levels.length; i++) {
    if (overall >= levels[i][0]) { level = levels[i][1]; break; }
  }

  var summaries = [
    t('matchSummary1'),
    t('matchSummary2'),
    t('matchSummary3'),
    t('matchSummary4'),
    t('matchSummary5')
  ];
  var summaryIndex = Math.floor(rng() * summaries.length);

  return { overall: overall, personality: personality, emotional: emotional, career: career, values: values, level: level, summary: summaries[summaryIndex] };
}

function doMatch() {
  var nameA = document.getElementById('match-name-a').value.trim();
  var nameB = document.getElementById('match-name-b').value.trim();
  var dateA = document.getElementById('match-date-a').value;
  var dateB = document.getElementById('match-date-b').value;

  if (!nameA || !nameB) return;

  document.querySelector('#screen-match-input .input-content').style.display = 'none';
  document.getElementById('match-loading-area').classList.add('active');

  var loadingText = document.getElementById('match-loading-text');
  var trigram = document.getElementById('match-loading-trigram');
  loadingText.textContent = t('matchLoading1');
  trigram.textContent = '☰';

  setTimeout(function() {
    loadingText.textContent = t('matchLoading2');
    trigram.textContent = '☲';
  }, 1200);

  setTimeout(function() {
    loadingText.textContent = t('matchLoading3');
    trigram.textContent = '☵';
  }, 2400);

  setTimeout(function() {
    var match = calculateMatch(nameA, dateA, nameB, dateB);
    currentMatchResult = match;
    currentMatchResult.nameA = nameA;
    currentMatchResult.nameB = nameB;
    saveToHistory({
      type: 'match',
      nameA: nameA,
      nameB: nameB,
      overall: match.overall,
      level: match.level
    });
    showMatchResult(match, nameA, nameB);
  }, 3600);
}

function getScoreColor(score) {
  if (score >= 80) return '#4a9e6b';
  if (score >= 60) return '#c9a96e';
  if (score >= 40) return '#c47a3a';
  return '#c44a3a';
}

function showMatchResult(match, nameA, nameB) {
  var area = document.getElementById('match-result-area');
  var circumference = 2 * Math.PI * 68;
  var offset = circumference - (match.overall / 100) * circumference;
  var scoreColor = getScoreColor(match.overall);

  var dimensions = [
    { label: t('personality'), value: match.personality },
    { label: t('emotional'), value: match.emotional },
    { label: t('careerDim'), value: match.career },
    { label: t('values'), value: match.values }

      dimHtml +
    '</div>' +
    '<div class="result-card delay2">' +
      '<div class="match-summary">' + match.summary + '</div>' +
    '</div>' +
    '<div class="algo-card" id="match-algo-card">' +
      '<div class="algo-toggle" onclick="toggleMatchAlgo()" touch-action="manipulation">' +
        '<span class="algo-toggle-icon" id="match-algo-icon">▸</span>' +
        '<span class="algo-toggle-text">' + t('viewMatchAlgo') + '</span>' +
      '</div>' +
      '<div class="algo-detail" id="match-algo-detail" style="display:none">' +
        '<div class="algo-step">' +
          '<div class="algo-step-label">' + t('matchAlgoStep1') + '</div>' +
          '<div class="algo-step-code">' + t('matchAlgoStep1Code') + '</div>' +
          '<div class="algo-step-desc">' + escapeHtml(nameA) + ' + ' + escapeHtml(nameB) + ' ' + t('matchAlgoStep1Desc') + '</div>' +
        '</div>' +
        '<div class="algo-step">' +
          '<div class="algo-step-label">' + t('matchAlgoStep2') + '</div>' +
          '<div class="algo-step-code">' + t('matchAlgoStep2Code') + '</div>' +
          '<div class="algo-step-desc">' + t('matchAlgoStep2Desc') + '</div>' +
        '</div>' +
        '<div class="algo-step">' +

          '<div class="algo-step-desc">' + t('matchAlgoStep3Desc1') + match.personality + t('matchAlgoStep3Desc2') + match.emotional + t('matchAlgoStep3Desc3') + match.career + t('matchAlgoStep3Desc4') + match.values + '%</div>' +
        '</div>' +
        '<div class="algo-step">' +
          '<div class="algo-step-label">' + t('matchAlgoStep4') + '</div>' +
          '<div class="algo-step-code">' + t('matchAlgoStep4Code') + '</div>' +
          '<div class="algo-step-desc">' + t('matchAlgoStep4Desc1') + match.personality + ' + ' + match.emotional + ' + ' + match.career + ' + ' + match.values + t('matchAlgoStep4Desc2') + match.overall + t('matchAlgoStep4Desc3') + '</div>' +
          '<div class="algo-step-desc">' + t('matchAlgoStep4Desc4') + escapeHtml(match.level) + '</div>' +

    '</div>' +
    '<button class="btn-text" onclick="goHome()" touch-action="manipulation">' + t('backHome') + '</button>' +

  previousScreen = 'screen-match-input';

  // Animate score ring and number
  setTimeout(function() {
    var ring = document.getElementById('score-ring');
    if (ring) ring.style.strokeDashoffset = offset;
    animateNumber('score-num', 0, match.overall, 800);
    // Animate dimension bars
    var fills = document.querySelectorAll('.match-dimension-fill');
    for (var i = 0; i < fills.length; i++) {
      (function(fill) {
        setTimeout(function() {
          fill.style.width = fill.getAttribute('data-width');
        }, 200);
      })(fills[i]);
    }
  }, 100);
}

function animateNumber(elementId, start, end, duration) {
  var el = document.getElementById(elementId);
  if (!el) return;
  var startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(start + (end - start) * eased);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function shareMatchResult() {
  if (!currentMatchResult) return;
  var m = currentMatchResult;
  var text = t('matchSharePrefix') + m.nameA + ' & ' + m.nameB + '\n' +
    t('matchShareScore') + m.overall + '% · ' + m.level + '\n' +
    m.summary + t('matchShareSuffix');

  if (navigator.share) {
    navigator.share({ title: t('matchShareTitle'), text: text }).catch(function() {});
  } else {
    navigator.clipboard.writeText(text).then(function() {
      showToast(t('copiedToClipboard'));
    }).catch(function() {
      showToast(t('copyFailed'));
    });
  }
}

// ===== Wooden Fish (电子木鱼) =====
function startWoodenFish() {
  previousScreen = 'screen-home';
  loadMerit();
  showScreen('screen-woodenfish');
}

function loadMerit() {
  meritTotal = parseInt(localStorage.getItem('iching_merit') || '0', 10);
  var today = new Date();
  var todayKey = 'iching_merit_today_' + today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
  var savedToday = localStorage.getItem(todayKey);
  if (savedToday) {
    meritToday = parseInt(savedToday, 10);
  } else {
    meritToday = 0;
  }
  updateMeritDisplay();
}

function saveMerit() {
  localStorage.setItem('iching_merit', String(meritTotal));
  var today = new Date();
  var todayKey = 'iching_merit_today_' + today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
  localStorage.setItem(todayKey, String(meritToday));
}

function updateMeritDisplay() {
  document.getElementById('merit-counter').textContent = t('meritPlus') + meritTotal;
  document.getElementById('merit-today').textContent = t('meritToday') + meritToday + t('meritTodayUnit');
}

function playKnock() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var now = audioCtx.currentTime;

  // Main "tok" sound - wooden knock
  var osc1 = audioCtx.createOscillator();
  var gain1 = audioCtx.createGain();
  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);
  osc1.frequency.setValueAtTime(1200, now);
  osc1.frequency.exponentialRampToValueAtTime(400, now + 0.05);
  osc1.type = 'sine';
  gain1.gain.setValueAtTime(0.4, now);
  gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  osc1.start(now);
  osc1.stop(now + 0.12);

  // Body resonance
  var osc2 = audioCtx.createOscillator();
  var gain2 = audioCtx.createGain();
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.frequency.setValueAtTime(200, now);
  osc2.frequency.exponentialRampToValueAtTime(120, now + 0.2);
  osc2.type = 'sine';
  gain2.gain.setValueAtTime(0.15, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  osc2.start(now);
  osc2.stop(now + 0.25);

  // Noise burst for attack transient (wood impact)
  var bufferSize = audioCtx.sampleRate * 0.03;
  var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
  }
  var noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  var noiseGain = audioCtx.createGain();
  var noiseFilter = audioCtx.createBiquadFilter();
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 2000;
  noiseFilter.Q.value = 1;
  noiseGain.gain.setValueAtTime(0.2, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
  noise.start(now);
}

function knockFish() {
  playKnock();
  meritTotal++;
  meritToday++;
  saveMerit();
  updateMeritDisplay();

  // Knocking animation on area
  var area = document.getElementById('woodenfish-area');
  area.classList.remove('knocking');
  void area.offsetWidth;
  area.classList.add('knocking');

  // Bounce counter
  var counter = document.getElementById('merit-counter');
  counter.classList.remove('bounce');
  void counter.offsetWidth;
  counter.classList.add('bounce');

  // Ripple 1
  var ripple = document.getElementById('woodenfish-ripple');
  ripple.classList.remove('active');
  void ripple.offsetWidth;
  ripple.classList.add('active');

  // Ripple 2 (delayed)
  var ripple2 = document.getElementById('woodenfish-ripple2');
  ripple2.classList.remove('active');
  void ripple2.offsetWidth;
  ripple2.classList.add('active');

  // Glow
  var glow = document.getElementById('woodenfish-glow');
  glow.classList.remove('active');
  void glow.offsetWidth;
  glow.classList.add('active');

  // Floating "+1" text
  var floatEl = document.createElement('div');
  floatEl.className = 'merit-float';
  floatEl.textContent = '+1';
  floatEl.style.left = (100 + (Math.random() - 0.5) * 40) + 'px';
  floatEl.style.top = '40px';
  area.appendChild(floatEl);
  setTimeout(function() {
    if (floatEl.parentNode) floatEl.parentNode.removeChild(floatEl);
  }, 1000);
}

function toggleAutoMode() {
  autoMode = !autoMode;
  var btn = document.getElementById('auto-toggle');
  if (autoMode) {
    btn.classList.add('active');
    startAutoMode();
  } else {
    btn.classList.remove('active');
    stopAutoMode();
  }
}

function startAutoMode() {
  stopAutoMode();
  var interval = 1000 / autoSpeed;
  autoInterval = setInterval(function() {
    knockFish();
  }, interval);
}

function stopAutoMode() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
  }
  autoMode = false;
  var btn = document.getElementById('auto-toggle');
  if (btn) btn.classList.remove('active');
}

function setSpeed(speed, el) {
  autoSpeed = speed;
  var btns = document.querySelectorAll('.speed-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  el.classList.add('active');
  if (autoMode) {
    startAutoMode();
  }
}

function resetMerit() {
  meritTotal = 0;
  meritToday = 0;
  saveMerit();
  updateMeritDisplay();
  showToast(t('meritReset'));
}
